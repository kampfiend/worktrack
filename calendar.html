<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkTrack Calendar</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body data-page="calendar">
    <main class="app-shell" aria-label="WorkTrack capstone prototype">
      <section class="phone-frame" id="app">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" data-i18n-aria="menuOpen"><span></span><span></span><span></span></button>
          <strong class="brand">WorkTrack</strong>
          <button class="language-pill" id="languageButton" type="button" data-i18n-aria="languageButton"><span class="language-dot" aria-hidden="true"></span><span id="languageLabel">English</span></button>
        </header>
        <div class="backdrop" id="backdrop" hidden></div>
        <aside class="side-panel" id="sidePanel" aria-hidden="true"></aside>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <section class="screen-root">
          <div class="screen">
            <h1 id="journeyTitle">Your Journey.</h1>
            <p class="muted" id="journeySubtitle">Tracking your status this month.</p>
            <article class="calendar-card">
              <div class="card-title-row">
                <h2 id="monthLabel">Month</h2>
                <div class="month-controls"><button id="monthPrev" type="button" data-i18n-aria="calendarPrev">&lt;</button><button id="monthNext" type="button" data-i18n-aria="calendarNext">&gt;</button></div>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </article>
            <section id="logPanel"></section>
            <input id="paycheckInput" type="file" accept=".pdf,.jpg,.jpeg,.png,.heic,image/*,application/pdf" hidden />
          </div>
        </section>
        <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>
      </section>
    </main>
    <script src="./js/core/config.js"></script><script src="./js/core/storage.js"></script><script src="./js/core/state.js"></script><script src="./js/core/i18n.js"></script><script src="./js/core/date.js"></script><script src="./js/core/dom.js"></script><script src="./js/core/shell.js"></script><script src="./js/features/navigation.js"></script><script src="./js/features/reset.js"></script><script src="./js/features/logs.js"></script><script src="./js/features/documents.js"></script><script src="./js/pages/calendar-page.js"></script>
  </body>
</html>
