<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkTrack Home</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body data-page="home">
    <main class="app-shell" aria-label="WorkTrack capstone prototype">
      <section class="phone-frame" id="app">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" data-i18n-aria="menuOpen"><span></span><span></span><span></span></button>
          <strong class="brand">WorkTrack</strong>
          <button class="language-pill" id="languageButton" type="button" data-i18n-aria="languageButton"><span class="language-dot" aria-hidden="true"></span><span id="languageLabel">English</span></button>
        </header>
        <div class="backdrop" id="backdrop" hidden></div>
        <aside class="side-panel" id="sidePanel" aria-hidden="true"></aside>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <section class="screen-root">
          <div class="screen">
            <section class="home-heading">
              <h1 id="homeGreeting">Good Morning, Will!</h1>
              <p id="todayLabel">Today</p>
            </section>
            <div id="timerMount"></div>
            <article class="pay-card">
              <span class="eyebrow" data-i18n="paycheckDay">Paycheck Day</span>
              <h2 id="payTitle">Next payment soon</h2>
              <p id="paySubtitle">Expected day 15 of this month.</p>
              <button class="circle-link" type="button" onclick="location.href='./calendar.html'" data-i18n-aria="navCalendar">&gt;</button>
            </article>
            <section class="quick-grid">
              <button class="quick-card" type="button" onclick="location.href='./calendar.html'"><span>+</span><strong data-i18n="addTodayLog">Add today's log</strong></button>
              <button class="quick-card" type="button" onclick="location.href='./vault.html'"><span class="quick-card-icon document-icon" aria-hidden="true"></span><strong data-i18n="uploadDocument">Upload document</strong></button>
            </section>
          </div>
        </section>
        <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>
      </section>
    </main>
    <script src="./js/core/config.js"></script><script src="./js/core/storage.js"></script><script src="./js/core/state.js"></script><script src="./js/core/i18n.js"></script><script src="./js/core/date.js"></script><script src="./js/core/dom.js"></script><script src="./js/core/shell.js"></script><script src="./js/features/navigation.js"></script><script src="./js/features/reset.js"></script><script src="./js/features/timer.js"></script><script src="./js/pages/home-page.js"></script>
  </body>
</html>
