<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkTrack Login</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body data-page="login">
    <main class="app-shell" aria-label="WorkTrack capstone prototype">
      <section class="phone-frame auth-mode" id="app">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" data-i18n-aria="menuOpen"><span></span><span></span><span></span></button>
          <strong class="brand">WorkTrack</strong>
          <button class="language-pill" id="languageButton" type="button" data-i18n-aria="languageButton"><span class="language-dot" aria-hidden="true"></span><span id="languageLabel">English</span></button>
        </header>
        <div class="backdrop" id="backdrop" hidden></div>
        <aside class="side-panel" id="sidePanel" aria-hidden="true"></aside>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <section class="screen-root">
          <div class="auth-screen">
            <article class="auth-card">
              <h1 data-i18n="loginTitle">Welcome Back</h1>
              <p class="muted" data-i18n="loginIntro">Access your support portal and document vault.</p>
              <form id="loginForm">
                <label><span data-i18n="idEmail">ID / E-mail</span><input name="email" type="email" value="worker@example.com" data-i18n-placeholder="idEmailPlaceholder" autocomplete="email" /></label>
                <label><span data-i18n="password">Password</span><input name="password" type="password" value="worktrack" data-i18n-placeholder="passwordPlaceholder" autocomplete="current-password" /></label>
                <button class="primary wide" type="submit"><span data-i18n="login">Log In</span> →</button>
              </form>
              <div class="divider-label"><span data-i18n="newTo">New to WorkTrack?</span></div>
              <a class="secondary wide" href="./signup.html" style="display:grid;place-items:center;text-decoration:none;" data-i18n="createAccount">Create an Account</a>
            </article>
          </div>
        </section>
        <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>
      </section>
    </main>
    <script src="./js/core/config.js"></script>
    <script src="./js/core/storage.js"></script>
    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/date.js"></script>
    <script src="./js/core/dom.js"></script>
    <script src="./js/core/shell.js"></script>
    <script src="./js/features/navigation.js"></script><script src="./js/features/reset.js"></script>
    <script src="./js/features/auth.js"></script>
    <script src="./js/pages/login-page.js"></script>
  </body>
</html>
