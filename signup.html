<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkTrack Sign Up</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="./icon.png" />
  </head>
  <body data-page="signup">
    <main class="app-shell" aria-label="WorkTrack capstone prototype">
      <section class="phone-frame auth-mode" id="app">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" data-i18n-aria="menuOpen"><span></span><span></span><span></span></button>
          <strong class="brand">WorkTrack</strong>
          <button class="language-pill" id="languageButton" type="button" data-i18n-aria="languageButton"><span class="language-dot" aria-hidden="true"></span><span id="languageLabel">English</span></button>
        </header>
        <div class="backdrop" id="backdrop" hidden></div>
        <aside class="side-panel" id="sidePanel" aria-hidden="true"></aside>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <section class="screen-root">
          <div class="auth-screen">
            <article class="auth-card">
              <h1 data-i18n="signupTitle">Create Account</h1>
              <p class="muted" data-i18n="signupIntro">Please fill in your basic details to get started.</p>
              <form id="signupForm">
                <label><span data-i18n="fullName">Full name</span><input id="signupName" name="name" type="text" data-i18n-placeholder="fullNamePlaceholder" /></label>
                <label><span data-i18n="nationality">Nationality</span>
                  <select id="signupNationality" name="nationality">
                  </select>
                </label>
                <label><span data-i18n="emailAddress">E-mail address</span><input id="signupEmail" name="email" type="email" data-i18n-placeholder="emailPlaceholder" /></label>
                <label><span data-i18n="residentId">Resident card ID</span><input id="signupResidentId" name="residentId" type="text" data-i18n-placeholder="idNumber" /></label>
                <label><span data-i18n="dateOfBirth">Date of birth</span><input id="signupBirthDate" name="birthDate" type="date" /></label>
                <label><span data-i18n="payday">Payday each month</span><input id="signupPayday" name="payday" type="number" min="1" max="31" /></label>
                <label><span data-i18n="password">Password</span><input name="password" type="password" value="worktrack" /></label>
                <label><span data-i18n="confirmPassword">Confirm password</span><input name="confirmPassword" type="password" value="worktrack" /></label>
                <button class="primary wide" type="submit" data-i18n="createAccount">Create an Account</button>
                <a class="secondary wide" href="./index.html" style="display:grid;place-items:center;text-decoration:none;" data-i18n="cancel">Cancel</a>
              </form>
            </article>
          </div>
        </section>
        <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>
      </section>
    </main>
    <script src="./js/core/config.js"></script><script src="./js/core/storage.js"></script><script src="./js/core/state.js"></script><script src="./js/core/i18n.js"></script><script src="./js/core/date.js"></script><script src="./js/core/dom.js"></script><script src="./js/core/shell.js"></script><script src="./js/features/navigation.js"></script><script src="./js/features/reset.js"></script><script src="./js/features/auth.js"></script><script src="./js/pages/signup-page.js"></script>
  </body>
</html>
