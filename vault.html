<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkTrack Vault</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/pages.css" />
  </head>
  <body data-page="vault">
    <main class="app-shell" aria-label="WorkTrack capstone prototype">
      <section class="phone-frame" id="app">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuButton" type="button" data-i18n-aria="menuOpen"><span></span><span></span><span></span></button>
          <strong class="brand">WorkTrack</strong>
          <button class="language-pill" id="languageButton" type="button" data-i18n-aria="languageButton"><span class="language-dot" aria-hidden="true"></span><span id="languageLabel">English</span></button>
        </header>
        <div class="backdrop" id="backdrop" hidden></div>
        <aside class="side-panel" id="sidePanel" aria-hidden="true"></aside>
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
        <section class="screen-root">
          <div class="screen">
            <h1 id="vaultTitle">Document Vault</h1>
            <p class="muted" id="vaultSubtitle">Keep employment documents together for support consultation.</p>
            <article class="vault-status">
              <h2 id="requiredStatusTitle">Required Status</h2>
              <div class="required-list" id="requiredList"></div>
              <div class="progress-label"><span data-i18n="progress">Progress</span><span id="progressText">0%</span></div>
              <div class="progress-track"><span id="progressFill"></span></div>
            </article>
            <section class="document-list" id="documentList"></section>
            <form class="selected-log-card" id="customDocArea">
              <label><span data-i18n="customDocName">Custom document name</span><input name="title" type="text" data-i18n-placeholder="docVisa" /></label>
              <button class="primary wide" type="submit" data-i18n="addMoreCustomFields">+ Add More Custom Fields</button>
            </form>
            <input id="documentInput" type="file" accept=".pdf,.jpg,.jpeg,.png,.heic,image/*,application/pdf" hidden />
          </div>
        </section>
        <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>
      </section>
    </main>
    <script src="./js/core/config.js"></script><script src="./js/core/storage.js"></script><script src="./js/core/state.js"></script><script src="./js/core/i18n.js"></script><script src="./js/core/date.js"></script><script src="./js/core/dom.js"></script><script src="./js/core/shell.js"></script><script src="./js/features/navigation.js"></script><script src="./js/features/reset.js"></script><script src="./js/features/documents.js"></script><script src="./js/pages/vault-page.js"></script>
  </body>
</html>
